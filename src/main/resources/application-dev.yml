server:
  port: 8080

spring:
  application:
    name: course-arrange
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/course_arrange_v2?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: CourseArrangeHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lyk.coursearrange.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: true

logging:
  level:
    com.lyk.coursearrange: info
    org.springframework.web: info

aliyun:
  oss:
    file:
      endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
      accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:replace-me}
      accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:replace-me}
      bucketName: ${ALIYUN_OSS_BUCKET_NAME:arrange}
